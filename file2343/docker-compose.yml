version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# NeuroScan · ASD Behavior Detector  — Docker Compose
#
# CPU mode:   docker compose up
# GPU mode:   docker compose --profile gpu up
# Build only: docker compose build
# Stop:       docker compose down
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── CPU service (default) ──────────────────────────────────────────────────
  neuroscan:
    build:
      context: .
      dockerfile: Dockerfile
    image: neuroscan-asd:latest
    container_name: neuroscan-asd
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
    volumes:
      # Persist temporary uploads across restarts (optional)
      - uploads_data:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── GPU service (opt-in via --profile gpu) ────────────────────────────────
  neuroscan-gpu:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: Dockerfile
    image: neuroscan-asd:latest
    container_name: neuroscan-asd-gpu
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
    volumes:
      - uploads_data:/app/uploads
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  uploads_data:
    driver: local
